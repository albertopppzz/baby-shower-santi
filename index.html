<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Shower de Santiago - Snoopy</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --celeste: #89cff0;
            --celeste-fuerte: #5dade2;
            --blanco-cristal: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #e3f2fd;
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        /* BURBUJAS */
        .burbujas-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .burbuja { position: absolute; bottom: -100px; background: rgba(255, 255, 255, 0.6); border-radius: 50%; animation: flotar 10s infinite linear; border: 1px solid rgba(255,255,255,0.8); }
        @keyframes flotar { 0% { transform: translateY(0); opacity: 0; } 10% { opacity: 0.8; } 100% { transform: translateY(-120vh); opacity: 0; } }
        .burbuja:nth-child(1) { left: 10%; width: 40px; height: 40px; animation-duration: 8s; }
        .burbuja:nth-child(2) { left: 80%; width: 60px; height: 60px; animation-duration: 12s; }
        .burbuja:nth-child(3) { left: 40%; width: 30px; height: 30px; animation-duration: 9s; }

        .container {
            position: relative; z-index: 10; max-width: 500px; width: 100%;
            background: var(--blanco-cristal); padding: 30px 20px;
            border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border: 6px solid #fff; backdrop-filter: blur(10px); text-align: center;
        }

        /* IMAGEN SNOOPY */
        .snoopy-img {
            width: 150px;
            margin-bottom: -10px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        .baby-name { font-family: 'Pacifico', cursive; color: var(--celeste); font-size: 3.2rem; margin: 10px 0; }
        .parents { font-size: 0.85rem; color: #777; font-style: italic; margin-bottom: 20px; }

        /* CONTADOR */
        #countdown { display: flex; justify-content: center; gap: 8px; margin: 15px 0; }
        .time-box { background: var(--celeste); color: white; padding: 10px; border-radius: 15px; min-width: 60px; }
        .time-box div { font-size: 1.2rem; font-weight: bold; }
        .time-box span { font-size: 0.55rem; text-transform: uppercase; }

        .map-wrapper { margin: 20px 0; border-radius: 20px; overflow: hidden; border: 3px solid #fff; }

        .instruccion-importante { font-size: 0.8rem; color: #e67e22; font-weight: 600; margin-bottom: 15px; }
        
        .btn-confirmar {
            background-color: #25d366; color: white; padding: 15px 25px;
            border-radius: 50px; font-weight: bold; border: none; cursor: pointer;
            font-family: 'Montserrat'; transition: 0.3s; font-size: 0.9rem;
        }

        /* TICKET SNOOPY */
        #ticket-animado { display: none; margin-top: 20px; perspective: 1000px; }
        .ticket {
            background: white; border: 2px dashed var(--celeste); padding: 20px;
            border-radius: 15px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            animation: ticketEntrada 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes ticketEntrada { 0% { transform: scale(0.5) rotateX(-90deg); opacity: 0; } 100% { transform: scale(1) rotateX(0deg); opacity: 1; } }
        
        .snoopy-ticket-icon { width: 50px; position: absolute; top: -25px; right: 10px; }

        .msg-final { color: #2ecc71; font-weight: bold; margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="burbujas-bg">
        <div class="burbuja"></div><div class="burbuja"></div><div class="burbuja"></div><div class="burbuja"></div>
    </div>

    <div class="container" data-aos="zoom-in">
        <img src="https://i.pinimg.com/originals/f3/7a/77/f37a77e814041e97d10e54d310111a8c.png" alt="Snoopy Baby" class="snoopy-img">
        
        <h2 style="font-weight: 300; letter-spacing: 4px; color: #aaa; font-size: 0.7rem; margin-top: 0;">BABY SHOWER</h2>
        <h1 class="baby-name">Santiago</h1>

        <div class="parents">
            <strong>Yolanda Estephania Hernandez May</strong><br>&<br><strong>Nestor David Ake Cardenas</strong>
        </div>

        <div id="info-invitado">
            <h3 id="txt-hola" style="color: var(--celeste-fuerte); margin-bottom: 5px;">¡Hola!</h3>
            <p id="txt-pases" style="margin: 0; font-size: 0.9rem;"></p>
        </div>

        <div id="countdown">
            <div class="time-box"><div id="days">00</div><span>Días</span></div>
            <div class="time-box"><div id="hours">00</div><span>Hrs</span></div>
            <div class="time-box"><div id="minutes">00</div><span>Min</span></div>
            <div class="time-box"><div id="seconds">00</div><span>Seg</span></div>
        </div>

        <div class="map-wrapper">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3733.3041249767215!2d-86.9452814!3d20.5038316!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8f4e59cf7199469b%3A0x633350325f540705!2sCozumel%2C%20Q.R.!5e0!3m2!1ses!2smx!4v1714421000000!5m2!1ses!2smx" width="100%" height="180" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>

        <div id="seccion-confirmar">
            <p class="instruccion-importante">⚠️ CONFIRMA TU ASISTENCIA AQUÍ:</p>
            <button onclick="registrarAsistencia()" class="btn-confirmar" id="btn-enviar">
                CONFIRMAR MI ASISTENCIA
            </button>
        </div>

        <div id="ticket-animado">
            <div class="ticket">
                <img src="https://images.fineartamerica.com/images/artworkimages/mediumlarge/3/snoopy-baby-transparent-claudio-m-art.png" class="snoopy-ticket-icon">
                <h4>Pase Digital</h4>
                <p>Invitado: <strong id="ticket-nombre"></strong></p>
                <p>Accesos: <strong id="ticket-pases"></strong></p>
                <div class="msg-final">✅ ¡Accesos reservados!</div>
            </div>
        </div>

        <footer style="margin-top: 25px; font-size: 0.65rem; color: #bbb;">Con amor para Santiago • Temática Snoopy</footer>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        const params = new URLSearchParams(window.location.search);
        const nombreVal = params.get('invitado') ? params.get('invitado').replace(/_/g, ' ') : "Invitado Especial";
        const pasesVal = params.get('pases') || "1";

        document.getElementById('txt-hola').innerText = "¡Hola " + nombreVal + "!";
        document.getElementById('txt-pases').innerHTML = "Lugares reservados: <b>" + pasesVal + "</b>";

        function registrarAsistencia() {
            const FORM_ID = "1FAIpQLSfnMrcnofT1mMW4ohA5ypH8dlncByIE5uim4DHG4PjI105RWw"; 
            const ENTRY_ID = "entry.1814797220"; 
            const urlForm = `https://docs.google.com/forms/d/e/${FORM_ID}/formResponse?${ENTRY_ID}=${encodeURIComponent(nombreVal + " (" + pasesVal + " pases)")}&submit=Submit`;

            fetch(urlForm, { method: 'POST', mode: 'no-cors' }).then(() => {
                document.getElementById('seccion-confirmar').style.display = 'none';
                document.getElementById('ticket-nombre').innerText = nombreVal;
                document.getElementById('ticket-pases').innerText = pasesVal;
                document.getElementById('ticket-animado').style.display = 'block';
            });
        }

        const targetDate = new Date('May 22, 2026 16:00:00').getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = targetDate - now;
            if(diff > 0) {
                document.getElementById("days").innerText = Math.floor(diff / 86400000);
                document.getElementById("hours").innerText = Math.floor((diff % 86400000) / 3600000);
                document.getElementById("minutes").innerText = Math.floor((diff % 3600000) / 60000);
                document.getElementById("seconds").innerText = Math.floor((diff % 60000) / 1000);
            }
        }, 1000);
    </script>
</body>
</html>
